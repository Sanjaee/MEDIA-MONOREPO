# Network
bind 0.0.0.0
protected-mode yes
port 6379

# Security
# password is set via docker-compose command argument --requirepass
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command SHUTDOWN SHUTDOWN-PROD

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
dir /data

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128

# Timeout
timeout 0
tcp-keepalive 300

# Save (RDB snapshots)
save 900 1
save 300 10
save 60 10000
