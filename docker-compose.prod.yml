version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: media-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - nextjs

  nextjs:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: media-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - BACKEND_API_URL=http://api:8080/api
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-supersecretpassword30charslong123}@postgres:5432/${DB_NAME:-media_prod}
      - REDIS_URL=redis://:supersecretredispass@redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost
      - AUTH_URL=http://localhost
      - AUTH_TRUST_HOST=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      - PLISIO_API_KEY=${PLISIO_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    # No ports exposed to host directly!
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  api:
    build:
      context: ./be/apps/api
      dockerfile: Dockerfile
    container_name: media-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-supersecretpassword30charslong123}@postgres:5432/${DB_NAME:-media_prod}
      - REDIS_URL=redis://:supersecretredispass@redis:6379
      - PORT=8080
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: media-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-supersecretpassword30charslong123}
      POSTGRES_DB: ${DB_NAME:-media_prod}
      # Force SCRAM-SHA-256 for password encryption
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-media_prod}" ]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:alpine
    container_name: media-redis-prod
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-supersecretredispass}
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_prod_data:/data
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
